<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advocare – Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body {
        background: #0a0a0f;
        color: #f0f0ff;
        height: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        margin: 0;
        padding: 0;
      }

      .header {
        background: rgba(17, 17, 24, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #2a2a3a;
      }

      .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      .logo h1 {
        color: #ffffff;
      }

      .logo p {
        color: #8888aa;
      }

      .badge {
        background: rgba(79, 110, 247, 0.1);
        border: 1px solid rgba(79, 110, 247, 0.3);
        color: #4f6ef7;
      }

      .auth-shell {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        background: #111118;
        border: 1px solid #2a2a3a;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        padding: 32px;
      }

      .auth-title {
        font-size: 24px;
        font-weight: 700;
        color: #f0f0ff;
      }

      .auth-subtitle {
        margin-top: 8px;
        color: #8888aa;
        font-size: 14px;
      }

      .auth-toggle {
        margin-top: 24px;
        display: flex;
        gap: 8px;
      }

      .auth-toggle button {
        flex: 1;
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        color: #8888aa;
        padding: 10px 16px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .auth-toggle button:hover {
        border-color: #4f6ef7;
        color: #4f6ef7;
      }

      .auth-toggle button.active {
        background: #4f6ef7;
        color: #ffffff;
        border-color: #4f6ef7;
        box-shadow: 0 0 20px rgba(79, 110, 247, 0.3);
      }

      .auth-form {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .auth-label {
        font-size: 13px;
        font-weight: 600;
        color: #f0f0ff;
      }

      .auth-input {
        width: 100%;
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        border-radius: 8px;
        padding: 12px 14px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: #f0f0ff;
        outline: none;
        transition: all 0.2s ease;
      }

      .auth-input::placeholder {
        color: #8888aa;
      }

      .auth-input:focus {
        border-color: #4f6ef7;
        box-shadow: 0 0 12px rgba(79, 110, 247, 0.2);
        background: #1a1a24;
      }

      #submitBtn {
        background: linear-gradient(135deg, #4f6ef7, #6b84ff);
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 4px;
      }

      #submitBtn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(79, 110, 247, 0.4);
      }

      #submitBtn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .auth-error {
        margin-top: 12px;
        color: #ef4444;
        font-size: 13px;
        min-height: 18px;
      }

      .auth-footer {
        margin-top: 20px;
        text-align: center;
        color: #8888aa;
        font-size: 13px;
      }

      .auth-footer a {
        color: #4f6ef7;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .auth-footer a:hover {
        color: #6b84ff;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="logo" style="padding: 14px 24px;">
          <span class="logo-icon">⚖️</span>
          <div>
            <h1 style="margin: 0; font-size: 20px;">Advocare</h1>
            <p style="margin: 4px 0 0 0; font-size: 13px;">Free AI Legal Guidance</p>
          </div>
        </div>
      </div>
    </header>

    <main class="auth-shell">
      <section class="auth-card">
        <h2 class="auth-title" id="authTitle">Welcome back</h2>
        <p class="auth-subtitle" id="authSubtitle">
          Login to continue your legal assistance.
        </p>

        <div class="auth-toggle">
          <button
            id="loginToggle"
            class="active"
            onclick="setMode('login')"
          >
            Login
          </button>
          <button id="registerToggle" onclick="setMode('register')">
            Register
          </button>
        </div>

        <form class="auth-form" onsubmit="handleAuth(event)">
          <label class="auth-label" for="emailInput">Email</label>
          <input
            id="emailInput"
            class="auth-input"
            type="email"
            placeholder="you@example.com"
            required
          />

          <label class="auth-label" for="passwordInput">Password</label>
          <input
            id="passwordInput"
            class="auth-input"
            type="password"
            placeholder="Enter your password"
            minlength="6"
            required
          />

          <button id="submitBtn" type="submit">Login</button>
        </form>

        <p class="auth-error" id="authError"></p>

        <p class="auth-footer" id="authFooter">
          Don't have an account? <a href="#" onclick="setMode('register'); return false;">Sign up</a>
        </p>
      </section>
    </main>

    <script>
      const API_BASE = "http://localhost:8000";
      const TOKEN_KEY = "advocare_token";
      let mode = "login";

      function parseJwtPayload(token) {
        try {
          const payloadPart = token.split(".")[1];
          if (!payloadPart) return null;
          const normalized = payloadPart.replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized + "=".repeat((4 - (normalized.length % 4)) % 4);
          return JSON.parse(atob(padded));
        } catch {
          return null;
        }
      }

      function isTokenValid(token) {
        if (!token) return false;
        const payload = parseJwtPayload(token);
        if (!payload || typeof payload.exp !== "number") return false;
        return payload.exp > Math.floor(Date.now() / 1000);
      }

      function setMode(nextMode) {
        mode = nextMode;
        const isLogin = mode === "login";
        document.getElementById("loginToggle").classList.toggle("active", isLogin);
        document.getElementById("registerToggle").classList.toggle("active", !isLogin);
        document.getElementById("submitBtn").textContent = isLogin ? "Login" : "Create Account";
        document.getElementById("authTitle").textContent = isLogin
          ? "Welcome back"
          : "Create your account";
        document.getElementById("authSubtitle").textContent = isLogin
          ? "Login to continue your legal assistance."
          : "Register to start using Advocare.";
        document.getElementById("authError").textContent = "";
      }

      async function handleAuth(event) {
        event.preventDefault();
        const email = document.getElementById("emailInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const errorEl = document.getElementById("authError");
        const submitBtn = document.getElementById("submitBtn");

        errorEl.textContent = "";
        submitBtn.disabled = true;

        try {
          const response = await fetch(`${API_BASE}/${mode}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Authentication failed.");
          }

          if (!data.access_token) {
            throw new Error("No token returned by server.");
          }

          localStorage.setItem(TOKEN_KEY, data.access_token);
          window.location.href = "index.html";
        } catch (error) {
          errorEl.textContent =
            error.message || "Could not authenticate. Please try again.";
        } finally {
          submitBtn.disabled = false;
        }
      }

      window.addEventListener("load", () => {
        const token = localStorage.getItem(TOKEN_KEY);
        if (isTokenValid(token)) {
          window.location.href = "index.html";
          return;
        }
        setMode("login");
      });
    </script>
  </body>
</html>
