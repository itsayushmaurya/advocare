<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advocare – Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body {
        background: #0a0a0f;
        color: #f0f0ff;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow-y: auto;
      }

      .header {
        background: rgba(17, 17, 24, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #2a2a3a;
      }

      .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .logo:hover {
        opacity: 0.8;
      }

      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        color: #f0f0ff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.2s ease;
        position: relative;
      }

      .back-btn:hover {
        background: #222229;
        border-color: #4f6ef7;
        box-shadow: 0 0 15px rgba(79, 110, 247, 0.2);
      }

      .back-btn-tooltip {
        position: absolute;
        bottom: -32px;
        right: 0;
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        color: #8888aa;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 10;
      }

      .back-btn:hover .back-btn-tooltip {
        opacity: 1;
      }

      .logo h1 {
        color: #ffffff;
      }

      .logo p {
        color: #8888aa;
      }

      .badge {
        background: rgba(79, 110, 247, 0.1);
        border: 1px solid rgba(79, 110, 247, 0.3);
        color: #4f6ef7;
      }

      .auth-shell {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        background: #111118;
        border: 1px solid #2a2a3a;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        padding: 32px;
      }

      .auth-title {
        font-size: 24px;
        font-weight: 700;
        color: #f0f0ff;
      }

      .auth-subtitle {
        margin-top: 8px;
        color: #8888aa;
        font-size: 14px;
      }

      .auth-toggle {
        margin-top: 24px;
        display: flex;
        gap: 8px;
      }

      .auth-toggle button {
        flex: 1;
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        color: #8888aa;
        padding: 10px 16px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .auth-toggle button:hover {
        border-color: #4f6ef7;
        color: #4f6ef7;
      }

      .auth-toggle button.active {
        background: #4f6ef7;
        color: #ffffff;
        border-color: #4f6ef7;
        box-shadow: 0 0 20px rgba(79, 110, 247, 0.3);
      }

      .auth-form {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .auth-label {
        font-size: 13px;
        font-weight: 600;
        color: #f0f0ff;
      }

      .auth-input {
        width: 100%;
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        border-radius: 8px;
        padding: 12px 14px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: #f0f0ff;
        outline: none;
        transition: all 0.2s ease;
      }

      .auth-input::placeholder {
        color: #8888aa;
      }

      .auth-input:focus {
        border-color: #4f6ef7;
        box-shadow: 0 0 12px rgba(79, 110, 247, 0.2);
        background: #1a1a24;
      }

      .password-wrapper {
        position: relative;
      }

      .password-toggle {
        position: absolute;
        right: 14px;
        top: 12px;
        background: none;
        border: none;
        color: #8888aa;
        cursor: pointer;
        font-size: 18px;
        transition: color 0.2s ease;
        padding: 0;
      }

      .password-toggle:hover {
        color: #4f6ef7;
      }

      .auth-input.password-input {
        padding-right: 40px;
      }

      .password-requirements {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 12px;
      }

      .req-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #8888aa;
      }

      .req-icon {
        width: 16px;
        display: flex;
        justify-content: center;
        font-weight: 700;
      }

      .req-item.met {
        color: #22c55e;
      }

      .req-item.met .req-icon {
        color: #22c55e;
      }

      .req-item:not(.met) .req-icon {
        color: #ef4444;
      }

      .confirm-password-feedback {
        margin-top: 6px;
        font-size: 12px;
        min-height: 16px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .confirm-password-feedback.match {
        color: #22c55e;
      }

      .confirm-password-feedback.mismatch {
        color: #ef4444;
      }

      .auth-input.match-success {
        border-color: #22c55e;
        box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
      }

      .auth-input.match-error {
        border-color: #ef4444;
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
      }

      .auth-input.password-valid {
        border-color: #22c55e;
        box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
      }

      .age-error {
        margin-top: 6px;
        color: #ef4444;
        font-size: 12px;
        min-height: 16px;
      }

      #submitBtn {
        background: linear-gradient(135deg, #4f6ef7, #6b84ff);
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 4px;
      }

      #submitBtn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(79, 110, 247, 0.4);
      }

      #submitBtn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .auth-error {
        margin-top: 12px;
        color: #ef4444;
        font-size: 13px;
        min-height: 18px;
      }

      .auth-footer {
        margin-top: 20px;
        text-align: center;
        color: #8888aa;
        font-size: 13px;
      }

      .auth-footer a {
        color: #4f6ef7;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .auth-footer a:hover {
        color: #6b84ff;
      }

      .auth-toggle-btn {
        flex: 1;
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        color: #8888aa;
        padding: 10px 16px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .auth-toggle-btn:hover {
        border-color: #4f6ef7;
        color: #4f6ef7;
      }

      .auth-toggle-btn.active {
        background: #4f6ef7;
        color: #ffffff;
        border-color: #4f6ef7;
        box-shadow: 0 0 20px rgba(79, 110, 247, 0.3);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="logo" style="padding: 14px 24px; cursor: pointer;" onclick="window.location.href = 'home.html';">
          <span class="logo-icon">⚖️</span>
          <div>
            <h1 style="margin: 0; font-size: 20px;">Advocare</h1>
            <p style="margin: 4px 0 0 0; font-size: 13px;">Free AI Legal Guidance</p>
          </div>
        </div>
        <button class="back-btn" onclick="window.location.href = 'home.html';" style="margin-right: 24px;">
          ←
          <span class="back-btn-tooltip">Go back to Home</span>
        </button>
      </div>
    </header>

    <main class="auth-shell">
      <section class="auth-card">
        <h2 class="auth-title" id="authTitle">Welcome back</h2>
        <p class="auth-subtitle" id="authSubtitle">
          Login to continue your legal assistance.
        </p>

        <div class="auth-toggle">
          <button
            id="loginToggle"
            class="active"
            onclick="setMode('login')"
          >
            Login
          </button>
          <button id="registerToggle" onclick="setMode('register')">
            Register
          </button>
        </div>

        <form class="auth-form" onsubmit="handleAuth(event)">
          <div id="nameFieldContainer" style="display: none;">
            <label class="auth-label" for="nameInput">Full Name</label>
            <input
              id="nameInput"
              class="auth-input"
              type="text"
              placeholder="Your full name"
            />
          </div>

          <div id="ageFieldContainer" style="display: none;">
            <label class="auth-label" for="ageInput">Age (Optional)</label>
            <input
              id="ageInput"
              class="auth-input"
              type="number"
              min="1"
              max="120"
              placeholder="Your age"
              oninput="validateAge()"
            />
            <div class="age-error" id="ageError"></div>
          </div>

          <div id="userTypeFieldContainer" style="display: none;">
            <label class="auth-label">I am a:</label>
            <div style="display: flex; gap: 8px;">
              <button type="button" class="auth-toggle-btn active" onclick="setUserType('citizen')">Citizen</button>
              <button type="button" class="auth-toggle-btn" onclick="setUserType('lawyer')">Lawyer</button>
              <button type="button" class="auth-toggle-btn" onclick="setUserType('minor')">Minor</button>
            </div>
          </div>

          <label class="auth-label" for="emailInput">Email</label>
          <input
            id="emailInput"
            class="auth-input"
            type="email"
            placeholder="you@example.com"
            required
          />

          <label class="auth-label" for="passwordInput">Password</label>
          <div class="password-wrapper">
            <input
              id="passwordInput"
              class="auth-input password-input"
              type="password"
              placeholder="Enter your password"
              oninput="validatePassword(); validateConfirmPassword(); checkFormValidity()"
            />
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('passwordInput', this)">👁️</button>
          </div>
          <div class="password-requirements" id="passwordRequirementsContainer">
            <div class="req-item" id="req-length"><span class="req-icon">✗</span> At least 7 characters</div>
            <div class="req-item" id="req-upper"><span class="req-icon">✗</span> At least one uppercase letter</div>
            <div class="req-item" id="req-lower"><span class="req-icon">✗</span> At least one lowercase letter</div>
            <div class="req-item" id="req-number"><span class="req-icon">✗</span> At least one number</div>
            <div class="req-item" id="req-special"><span class="req-icon">✗</span> At least one special character (!@#$%^&*)</div>
          </div>

          <div id="confirmPasswordFieldContainer" style="display: none;">
            <label class="auth-label" for="confirmPasswordInput">Re-enter Password</label>
            <div class="password-wrapper">
              <input
                id="confirmPasswordInput"
                class="auth-input password-input"
                type="password"
                placeholder="Re-enter your password"
                oninput="validateConfirmPassword(); checkFormValidity()"
              />
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPasswordInput', this)">👁️</button>
            </div>
            <div class="confirm-password-feedback" id="confirmPasswordFeedback"></div>
          </div>

          <div style="display: flex; align-items: flex-start; gap: 8px; margin-top: 16px; display: none;" id="privacyContainer">
            <input
              id="privacyCheckbox"
              type="checkbox"
              style="width: 16px; height: 16px; cursor: pointer; accent-color: #4f6ef7; margin-top: 2px; flex-shrink: 0;"
              oninput="checkFormValidity()"
            />
            <label for="privacyCheckbox" style="font-size: 12px; color: #8888aa; cursor: pointer; line-height: 1.4;">
              I have read and agree to the <a href="privacy.html" target="_blank" style="color: #4f6ef7; text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='#6b84ff'" onmouseout="this.style.color='#4f6ef7'">Privacy Policy and Terms of Use</a>
            </label>
          </div>
          
          <p class="auth-error" id="privacyError" style="margin-top: 8px;"></p>

          <button id="submitBtn" type="submit">Login</button>
        </form>

        <p class="auth-error" id="authError"></p>

        <p class="auth-footer" id="authFooter">
          <span id="authFooterText">Don't have an account? </span><a href="#" id="authFooterLink" onclick="return false;"></a>
        </p>
      </section>
    </main>

    <script>
      const API_BASE = "http://localhost:8000";
      const TOKEN_KEY = "advocare_token";
      let mode = "login";
      let userType = "citizen";

      function parseJwtPayload(token) {
        try {
          const payloadPart = token.split(".")[1];
          if (!payloadPart) return null;
          const normalized = payloadPart.replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized + "=".repeat((4 - (normalized.length % 4)) % 4);
          return JSON.parse(atob(padded));
        } catch {
          return null;
        }
      }

      function isTokenValid(token) {
        if (!token) return false;
        const payload = parseJwtPayload(token);
        if (!payload || typeof payload.exp !== "number") return false;
        return payload.exp > Math.floor(Date.now() / 1000);
      }

      function setUserType(type) {
        userType = type;
        document.querySelectorAll('.auth-toggle-btn').forEach(btn => {
          if (btn.textContent.toLowerCase().includes(type)) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
        validateAge();
        checkFormValidity();
      }

      function togglePasswordVisibility(inputId, button) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          button.textContent = "🙈";
        } else {
          input.type = "password";
          button.textContent = "👁️";
        }
      }

      function validatePassword() {
        const password = document.getElementById("passwordInput").value;
        const req = {
          length: password.length >= 7,
          upper: /[A-Z]/.test(password),
          lower: /[a-z]/.test(password),
          number: /[0-9]/.test(password),
          special: /[!@#$%^&*]/.test(password)
        };

        document.getElementById("req-length").classList.toggle("met", req.length);
        document.getElementById("req-upper").classList.toggle("met", req.upper);
        document.getElementById("req-lower").classList.toggle("met", req.lower);
        document.getElementById("req-number").classList.toggle("met", req.number);
        document.getElementById("req-special").classList.toggle("met", req.special);

        const allMet = Object.values(req).every(v => v);
        document.getElementById("passwordInput").classList.toggle("password-valid", allMet);
        return allMet;
      }

      function validateConfirmPassword() {
        const password = document.getElementById("passwordInput").value;
        const confirmPassword = document.getElementById("confirmPasswordInput").value;
        const feedback = document.getElementById("confirmPasswordFeedback");
        const input = document.getElementById("confirmPasswordInput");

        if (confirmPassword === "") {
          feedback.textContent = "";
          input.classList.remove("match-success", "match-error");
          return false;
        }

        if (password === confirmPassword && password !== "") {
          feedback.textContent = "Passwords match ✓";
          feedback.className = "confirm-password-feedback match";
          input.classList.remove("match-error");
          input.classList.add("match-success");
          return true;
        } else {
          feedback.textContent = "Passwords do not match ✗";
          feedback.className = "confirm-password-feedback mismatch";
          input.classList.remove("match-success");
          input.classList.add("match-error");
          return false;
        }
      }

      function validateAge() {
        const ageInput = document.getElementById("ageInput");
        const ageError = document.getElementById("ageError");
        const age = ageInput.value ? parseInt(ageInput.value) : null;

        ageError.textContent = "";

        if (age === null) {
          return true;
        }

        if (userType === "minor") {
          if (age >= 18) {
            ageError.textContent = "Minors must be under 18 years old";
            ageInput.value = "";
            checkFormValidity();
            return false;
          }
        } else if (userType === "citizen" || userType === "lawyer") {
          if (age < 18) {
            ageError.textContent = "Please select Minor for users under 18";
            ageInput.value = "";
            checkFormValidity();
            return false;
          }
        }

        return true;
      }

      function checkFormValidity() {
        if (mode !== "register") return;

        const name = document.getElementById("nameInput").value.trim();
        const email = document.getElementById("emailInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const confirmPassword = document.getElementById("confirmPasswordInput").value;
        const age = document.getElementById("ageInput").value ? parseInt(document.getElementById("ageInput").value) : null;
        const privacyCheckbox = document.getElementById("privacyCheckbox");

        const passwordValid = validatePassword();
        const confirmValid = password === confirmPassword && confirmPassword !== "";
        
        const nameValid = name.length > 0;
        const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        const userTypeValid = userType && userType !== "";
        
        let ageValid = true;
        if (age !== null) {
          if (userType === "minor" && age >= 18) ageValid = false;
          if ((userType === "citizen" || userType === "lawyer") && age < 18) ageValid = false;
        }

        const allValid = nameValid && emailValid && passwordValid && confirmValid && userTypeValid && ageValid && privacyCheckbox.checked;
        document.getElementById("submitBtn").disabled = !allValid;
      }

       function setMode(nextMode) {
         mode = nextMode;
         const isLogin = mode === "login";
         document.getElementById("loginToggle").classList.toggle("active", isLogin);
         document.getElementById("registerToggle").classList.toggle("active", !isLogin);
         document.getElementById("submitBtn").textContent = isLogin ? "Login" : "Create Account";
         document.getElementById("authTitle").textContent = isLogin
           ? "Welcome back"
           : "Create your account";
         document.getElementById("authSubtitle").textContent = isLogin
           ? "Login to continue your legal assistance."
           : "Register to start using Advocare.";
         document.getElementById("authError").textContent = "";
         
         // Show/hide register fields
         document.getElementById("nameFieldContainer").style.display = isLogin ? "none" : "block";
         document.getElementById("ageFieldContainer").style.display = isLogin ? "none" : "block";
         document.getElementById("userTypeFieldContainer").style.display = isLogin ? "none" : "block";
         document.getElementById("privacyContainer").style.display = isLogin ? "none" : "flex";
         
         // Show/hide password requirements and confirm password (login mode only)
         document.getElementById("passwordRequirementsContainer").style.display = isLogin ? "none" : "block";
         document.getElementById("confirmPasswordFieldContainer").style.display = isLogin ? "none" : "block";
         
         // Update footer text and link
         const footerText = document.getElementById("authFooterText");
         const footerLink = document.getElementById("authFooterLink");
         if (isLogin) {
           footerText.textContent = "Don't have an account? ";
           footerLink.textContent = "Register";
           footerLink.onclick = () => { setMode("register"); return false; };
         } else {
           footerText.textContent = "Already have an account? ";
           footerLink.textContent = "Login";
           footerLink.onclick = () => { setMode("login"); return false; };
         }
         
         // Clear fields when switching modes
         if (isLogin) {
           document.getElementById("nameInput").value = "";
           document.getElementById("ageInput").value = "";
           document.getElementById("passwordInput").value = "";
           document.getElementById("confirmPasswordInput").value = "";
           document.getElementById("ageError").textContent = "";
           document.getElementById("confirmPasswordFeedback").textContent = "";
           document.getElementById("passwordInput").classList.remove("password-valid");
           document.getElementById("confirmPasswordInput").classList.remove("match-success", "match-error");
           userType = "citizen";
         } else {
           document.getElementById("emailInput").value = "";
           document.getElementById("passwordInput").value = "";
         }
         
         checkFormValidity();
       }

      async function handleAuth(event) {
        event.preventDefault();
        const email = document.getElementById("emailInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const errorEl = document.getElementById("authError");
        const submitBtn = document.getElementById("submitBtn");

        errorEl.textContent = "";
        submitBtn.disabled = true;

        try {
          let body;
          if (mode === "login") {
            body = { email, password };
          } else {
            const name = document.getElementById("nameInput").value.trim();
            const age = document.getElementById("ageInput").value ? parseInt(document.getElementById("ageInput").value) : null;
            
            if (!name) {
              throw new Error("Full name is required.");
            }
            if (!email) {
              throw new Error("Email is required.");
            }
            if (!password) {
              throw new Error("Password is required.");
            }
            const privacyCheckbox = document.getElementById("privacyCheckbox");
            const privacyError = document.getElementById("privacyError");
            if (!privacyCheckbox.checked) {
              privacyError.textContent = "You must agree to continue";
              submitBtn.disabled = false;
              return;
            }

            body = { name, email, age, user_type: userType, password };
          }

          const response = await fetch(`${API_BASE}/${mode}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Authentication failed.");
          }

          if (!data.access_token) {
            throw new Error("No token returned by server.");
          }

          localStorage.setItem(TOKEN_KEY, data.access_token);
          window.location.href = "index.html";
        } catch (error) {
          errorEl.textContent =
            error.message || "Could not authenticate. Please try again.";
        } finally {
          submitBtn.disabled = false;
        }
      }

      window.addEventListener("load", () => {
        const token = localStorage.getItem(TOKEN_KEY);
        if (isTokenValid(token)) {
          window.location.href = "index.html";
          return;
        }
        
        // Read URL query parameter "tab"
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get("tab");
        
        // Set initial mode: if tab is "login" or "register", use that; otherwise default to "register"
        if (tab === "login") {
          setMode("login");
        } else {
          setMode("register");
        }
      });
    </script>
  </body>
</html>
