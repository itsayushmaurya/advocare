<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Advocare</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="logo" onclick="window.location.href = 'index.html';" style="cursor: pointer;">
          <span class="logo-icon">⚖️</span>
          <div>
            <h1>Advocare</h1>
            <p>Free AI Legal Guidance for Every Indian</p>
          </div>
        </div>
        <button class="contact-home-btn" type="button" onclick="window.location.href = 'index.html';">
          Back Home
        </button>
      </div>
    </header>

    <main class="contact-page">
      <section class="contact-shell">
        <aside class="contact-info-card">
          <div>
            <p class="contact-kicker">Contact</p>
            <h2>Get in touch</h2>
            <p class="contact-intro">
              Have a question about Advocare or need help using the legal assistant?
            </p>
          </div>

          <div class="contact-info-list">
            <div class="contact-info-item">
              <span class="contact-info-icon">⌂</span>
              <div>
                <h3>Visit us</h3>
                <p>42 Civic Centre Road, New Delhi, India 110001</p>
              </div>
            </div>

            <div class="contact-info-item">
              <span class="contact-info-icon">@</span>
              <div>
                <h3>Chat to us</h3>
                <p>support@advocare.example</p>
              </div>
            </div>

            <div class="contact-info-item">
              <span class="contact-info-icon">☎</span>
              <div>
                <h3>Call us</h3>
                <p>+91 98765 43210</p>
              </div>
            </div>
          </div>

          <div class="contact-socials" aria-label="Social links">
            <span>in</span>
            <span>x</span>
            <span>f</span>
          </div>
        </aside>

        <section class="contact-form-card">
          <form id="contactForm" class="contact-form">
            <div class="contact-form-row">
              <label>
                First Name
                <input name="firstName" type="text" placeholder="Ayush" />
              </label>
              <label>
                Last Name
                <input name="lastName" type="text" placeholder="Maurya" />
              </label>
            </div>

            <label>
              Company Name
              <input name="companyName" type="text" placeholder="Company or organization" />
            </label>

            <label>
              Email
              <input name="email" type="email" placeholder="you@example.com" />
            </label>

            <label>
              Phone Number
              <input name="phoneNumber" type="tel" placeholder="+91 98765 43210" />
            </label>

            <label>
              Message
              <textarea name="message" placeholder="How can we help?"></textarea>
            </label>

            <label class="contact-checkbox">
              <input name="privacyAgreement" type="checkbox" />
              <span>I agree to the privacy policy and consent to being contacted.</span>
            </label>

            <button class="contact-submit-btn" type="submit">Submit</button>
          </form>
        </section>
      </section>
    </main>

    <script>
      document.getElementById("contactForm").addEventListener("submit", function (event) {
        event.preventDefault();
        const formData = new FormData(event.currentTarget);
        const data = Object.fromEntries(formData.entries());
        data.privacyAgreement = formData.get("privacyAgreement") === "on";
        console.log("Contact form submitted:", data);
      });
    </script>
  </body>
</html>
