<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advocare – AI Legal Assistant</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="logo" onclick="window.location.href = 'home.html';" style="cursor: pointer;">
          <span class="logo-icon">⚖️</span>
          <div>
            <h1>Advocare</h1>
            <p>Free AI Legal Guidance for Every Indian</p>
          </div>
        </div>
        <div class="profile-container" id="profileContainer" onclick="toggleProfileMenu(event)">
          <div class="avatar" id="profileAvatar">--</div>
          <span class="username" id="profileName">Loading...</span>
          <div class="profile-dropdown hidden" id="profileDropdown">
            <div class="profile-email" id="profileEmail">Loading...</div>
            <button class="profile-menu-item" type="button" onclick="openProfilePage(event)">Profile</button>
            <div class="profile-menu-item profile-menu-submenu">
              <span>Language</span>
              <span class="submenu-arrow">›</span>
              <div class="language-submenu">
                <button type="button" onclick="selectProfileLanguage(event, 'en')">English</button>
                <button type="button" onclick="selectProfileLanguage(event, 'hi')">हिंदी</button>
              </div>
            </div>
            <button class="profile-menu-item" type="button">Privacy Policy</button>
            <button class="profile-menu-item" type="button">Contact Us</button>
            <button class="profile-menu-item logout-item" type="button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <div class="app-layout" id="appLayout">
      <button class="hamburger-menu" id="hamburger" onclick="toggleSidebar()">☰</button>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebarCollapse()" title="Collapse sidebar">
            ◀
          </button>
          <button class="sidebar-new-chat-icon" onclick="startNewSession()" title="New Chat">
            +
          </button>
        </div>
        <button class="new-chat-btn" onclick="startNewSession()">
          + New Chat
        </button>
        <p class="sidebar-label">Previous Chats</p>
        <div id="sessionList" class="session-list"></div>
      </aside>

      <main class="main">
        <div class="examples-section">
          <p class="examples-label">Try an example:</p>
          <div class="chips">
            <button
              class="chip"
              onclick="
                setExample(
                  'My landlord is refusing to return my security deposit after I vacated the flat',
                )
              "
            >
              🏠 Landlord deposit
            </button>
            <button
              class="chip"
              onclick="
                setExample(
                  'I got scammed online, someone took money from my UPI account',
                )
              "
            >
              💸 UPI fraud
            </button>
            <button
              class="chip"
              onclick="
                setExample('My employer has not paid my salary for 2 months')
              "
            >
              👔 Unpaid salary
            </button>
            <button
              class="chip"
              onclick="
                setExample(
                  'I received a defective product and they are not giving refund',
                )
              "
            >
              📦 Defective product
            </button>
          </div>
        </div>

        <div class="chat-container">
          <div class="chat-window" id="chatWindow"></div>
          <div class="input-area">
            <textarea
              id="userInput"
              placeholder="Describe your legal problem here... (e.g. 'My boss fired me without notice')"
              rows="3"
              onkeydown="handleKey(event)"
            ></textarea>
            <div class="input-actions">
              <span class="char-count" id="charCount">0 / 2000</span>
              <div class="input-actions-right">
                <button class="settings-menu-btn" id="settingsMenuBtn" onclick="toggleSettingsMenu()" title="Settings">
                  ⚙️
                </button>
                <button class="send-btn" id="sendBtn" onclick="submitQuery()">
                  <span id="btnText">Get Legal Help →</span>
                  <span id="btnLoader" class="hidden">Analyzing...</span>
                </button>
              </div>
            </div>
            
            <!-- Settings Menu Popup -->
            <div class="settings-menu hidden" id="settingsMenu">
              <div class="settings-menu-header">Settings</div>
              
              <div class="settings-option">
                <label class="settings-label">Output Type</label>
                <div class="settings-toggle-group" role="group" aria-label="Output type">
                  <button type="button" class="settings-toggle" id="quickToggle" aria-pressed="false" onclick="setReplyMode('quick')">Quick</button>
                  <button type="button" class="settings-toggle active" id="detailToggle" aria-pressed="true" onclick="setReplyMode('detail')">Detailed</button>
                </div>
              </div>
              
              <div class="settings-option">
                <label class="settings-label">Language</label>
                <div class="settings-toggle-group" role="group" aria-label="Language">
                  <button type="button" class="settings-toggle active" id="langEnToggle" aria-pressed="true" onclick="setLanguage('en')">English</button>
                  <button type="button" class="settings-toggle" id="langHiToggle" aria-pressed="false" onclick="setLanguage('hi')">हिंदी</button>
                </div>
              </div>
            </div>

          </div>
        </div>
      </main>

      <!-- Strength Panel -->
      <aside class="strength-panel" id="strengthPanel">
        <div class="strength-header">
          <span>⚖️</span>
          <h3>Case Strength</h3>
        </div>

        <!-- Empty state -->
        <div class="strength-empty" id="strengthEmpty">
          <p>Submit your problem to see case analysis</p>
        </div>

        <!-- Results (hidden until first query) -->
        <div class="strength-results hidden" id="strengthResults">
          <!-- Score -->
          <div class="score-display" id="scoreDisplay"></div>

          <!-- Bar -->
          <div class="strength-bar-wrap">
            <div class="strength-bar" id="strengthBar">
              <div class="bar-red" id="barRed"></div>
              <div class="bar-green" id="barGreen"></div>
            </div>
            <div class="bar-labels">
              <span style="color: #ef4444">Weak</span>
              <span style="color: #22c55e">Strong</span>
            </div>
          </div>

          <!-- Buttons -->
          <div class="panel-buttons">
            <button
              class="panel-btn btn-green"
              onclick="togglePoints('positive')"
            >
              ✦ Strong Claims
            </button>
            <button
              class="panel-btn btn-red"
              onclick="togglePoints('negative')"
            >
              ⚠ Weak Points
            </button>
          </div>

          <!-- Points reveal -->
          <div class="points-box" id="positivePoints"></div>
          <div class="points-box" id="negativePoints"></div>
        </div>
      </aside>
    </div>

    <script src="app.js"></script>
    
    <!-- Sidebar Collapse & Settings Menu Functions -->
    <script>
      function toggleSettingsMenu() {
        const menu = document.getElementById('settingsMenu');
        menu.classList.toggle('hidden');
        
        // Close menu when clicking outside
        if (!menu.classList.contains('hidden')) {
          document.addEventListener('click', closeSettingsMenuOnClickOutside);
        }
      }

      function closeSettingsMenuOnClickOutside(event) {
        const menu = document.getElementById('settingsMenu');
        const btn = document.getElementById('settingsMenuBtn');
        
        if (!menu.contains(event.target) && !btn.contains(event.target)) {
          menu.classList.add('hidden');
          document.removeEventListener('click', closeSettingsMenuOnClickOutside);
        }
      }

      // Update settings toggle buttons when modes change
      function updateSettingsUI() {
        // Get current mode from localStorage
        const mode = localStorage.getItem('replyMode') || 'detail';
        const language = localStorage.getItem('language') || 'en';
        
        // Update output type buttons
        const quickToggle = document.getElementById('quickToggle');
        const detailToggle = document.getElementById('detailToggle');
        if (mode === 'quick') {
          quickToggle?.classList.add('active');
          detailToggle?.classList.remove('active');
        } else {
          detailToggle?.classList.add('active');
          quickToggle?.classList.remove('active');
        }
        quickToggle?.setAttribute('aria-pressed', mode === 'quick');
        detailToggle?.setAttribute('aria-pressed', mode !== 'quick');
        
        // Update language buttons
        const langEnToggle = document.getElementById('langEnToggle');
        const langHiToggle = document.getElementById('langHiToggle');
        if (language === 'hi') {
          langHiToggle?.classList.add('active');
          langEnToggle?.classList.remove('active');
        } else {
          langEnToggle?.classList.add('active');
          langHiToggle?.classList.remove('active');
        }
        langEnToggle?.setAttribute('aria-pressed', language !== 'hi');
        langHiToggle?.setAttribute('aria-pressed', language === 'hi');
      }

      document.addEventListener('DOMContentLoaded', function() {
        updateSettingsUI();
        if (typeof applySidebarState === 'function') {
          applySidebarState();
        }
      });

      if (new URLSearchParams(window.location.search).get('new') === 'true' && typeof loadLastSession === 'function') {
        loadLastSession = async function() {
          startNewSession();
        };
      }

      // Update settings UI whenever mode or language changes
      const originalSetReplyMode = window.setReplyMode;
      window.setReplyMode = function(mode) {
        if (originalSetReplyMode) originalSetReplyMode(mode);
        updateSettingsUI();
      };

      const originalSetLanguage = window.setLanguage;
      window.setLanguage = function(lang) {
        if (originalSetLanguage) originalSetLanguage(lang);
        updateSettingsUI();
      };
    </script>
