<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Advocare</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .profile-page {
        flex: 1;
        overflow: auto;
        padding: 48px 24px;
      }

      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--elevated);
        border: 1px solid var(--border);
        color: var(--text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.2s ease;
        position: relative;
      }

      .back-btn:hover {
        background: var(--surface);
        border-color: #4f6ef7;
        box-shadow: 0 0 15px rgba(79, 110, 247, 0.2);
      }

      .profile-panel {
        width: min(760px, 100%);
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
      }

      .profile-hero {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 28px;
        border-bottom: 1px solid var(--border);
      }

      .profile-avatar-large {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--elevated);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 24px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .profile-title h2 {
        font-size: 24px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }

      .profile-title p {
        font-size: 14px;
        color: var(--text-secondary);
      }

      .profile-form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        padding: 28px;
      }

      .profile-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .profile-field.full-width {
        grid-column: 1 / -1;
      }

      .profile-field label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .profile-field input,
      .profile-field textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 11px 12px;
        background: var(--elevated);
        color: var(--text);
        font: inherit;
        font-size: 14px;
        outline: none;
      }

      .profile-field textarea {
        min-height: 96px;
        resize: vertical;
      }

      .profile-field input:focus,
      .profile-field textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
      }

      .profile-actions {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding-top: 6px;
      }

      .profile-btn {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 16px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .profile-btn.cancel {
        background: transparent;
        color: var(--text-secondary);
      }

      .profile-btn.save {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
      }

      @media (max-width: 640px) {
        .profile-page {
          padding: 24px 16px;
        }

        .profile-hero,
        .profile-form {
          padding: 20px;
        }

        .profile-form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="logo" onclick="window.location.href = 'index.html';" style="cursor: pointer;">
          <span class="logo-icon">⚖️</span>
          <div>
            <h1>Advocare</h1>
            <p>Free AI Legal Guidance for Every Indian</p>
          </div>
        </div>
        <button class="back-btn" onclick="window.history.back();" title="Go back">←</button>
      </div>
    </header>

    <main class="profile-page">
      <section class="profile-panel">
        <div class="profile-hero">
          <div class="profile-avatar-large" id="profileAvatar">AM</div>
          <div class="profile-title">
            <h2 id="profileUserName">Loading...</h2>
            <p id="profileUserEmail">@user</p>
          </div>
        </div>

        <form class="profile-form">
          <div class="profile-field">
            <label for="profileFirstName">First Name</label>
            <input id="profileFirstName" type="text" placeholder="First Name" />
          </div>

          <div class="profile-field">
            <label for="profileLastName">Last Name</label>
            <input id="profileLastName" type="text" placeholder="Last Name" />
          </div>

          <div class="profile-field">
            <label for="profileUsername">Username</label>
            <input id="profileUsername" type="text" placeholder="Username" disabled />
          </div>

          <div class="profile-field">
            <label for="profileUserType">User Type</label>
            <input id="profileUserType" type="text" placeholder="User Type" disabled />
          </div>

          <div class="profile-field">
            <label for="profileAge">Age</label>
            <input id="profileAge" type="number" placeholder="Age" />
          </div>

          <div class="profile-field full-width">
            <label for="profileEmail">Email</label>
            <input id="profileEmail" type="email" placeholder="Email" disabled />
          </div>

          <div class="profile-actions">
            <button class="profile-btn cancel" type="button" onclick="cancelChanges()">Cancel</button>
            <button class="profile-btn save" type="button" onclick="saveProfile()">Save</button>
          </div>
        </form>
      </section>
    </main>

    <script>
      const API_BASE = "http://localhost:8000";
      const TOKEN_KEY = "advocare_token";

      window.addEventListener("load", async () => {
        const token = localStorage.getItem(TOKEN_KEY);
        if (!token) {
          window.location.href = "auth.html";
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/me`, {
            headers: {
              Authorization: `Bearer ${token}`
            }
          });

          if (!res.ok) {
            if (res.status === 401) {
              window.location.href = "auth.html";
              return;
            }
            throw new Error("Failed to load profile");
          }

          const user = await res.json();

          // Parse name into first/last
          const nameParts = (user.name || "").split(" ");
          const firstName = nameParts[0] || "";
          const lastName = nameParts.slice(1).join(" ") || "";

          // Generate username from email
          const username = user.email.split("@")[0];

          // Update avatar with initials
          const initials = (user.name || "U")
            .split(" ")
            .map(part => part[0])
            .join("")
            .toUpperCase();
          document.getElementById("profileAvatar").textContent = initials;

          // Update header
          document.getElementById("profileUserName").textContent = user.name;
          document.getElementById("profileUserEmail").textContent = user.email;

          // Update form fields
          document.getElementById("profileFirstName").value = firstName;
          document.getElementById("profileLastName").value = lastName;
          document.getElementById("profileUsername").value = username;
          document.getElementById("profileUserType").value = user.user_type || "citizen";
          document.getElementById("profileEmail").value = user.email || "";
          document.getElementById("profileAge").value = user.age || "";
        } catch (error) {
          alert("Error loading profile: " + error.message);
          window.location.href = "index.html";
        }
      });

      function saveProfile() {
        alert("Profile update feature coming soon");
      }

      function cancelChanges() {
        // Reset all form fields to their original loaded values
        window.addEventListener("load", reloadProfile);
        reloadProfile();
      }

      async function reloadProfile() {
        const token = localStorage.getItem("advocare_token");
        if (!token) {
          window.location.href = "auth.html";
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/me`, {
            headers: {
              Authorization: `Bearer ${token}`
            }
          });

          if (!res.ok) {
            if (res.status === 401) {
              window.location.href = "auth.html";
              return;
            }
            throw new Error("Failed to load profile");
          }

          const user = await res.json();

          // Parse name into first/last
          const nameParts = (user.name || "").split(" ");
          const firstName = nameParts[0] || "";
          const lastName = nameParts.slice(1).join(" ") || "";

          // Generate username from email
          const username = user.email.split("@")[0];

          // Update form fields
          document.getElementById("profileFirstName").value = firstName;
          document.getElementById("profileLastName").value = lastName;
          document.getElementById("profileUsername").value = username;
          document.getElementById("profileUserType").value = user.user_type || "citizen";
          document.getElementById("profileEmail").value = user.email || "";
          document.getElementById("profileAge").value = user.age || "";
        } catch (error) {
          alert("Error resetting profile: " + error.message);
        }
      }
    </script>
  </body>
</html>
